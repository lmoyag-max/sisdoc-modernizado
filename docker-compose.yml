services:
  # ── SQL Server 2022 ───────────────────────────────────────
  # IMPORTANTE: Al crear el contenedor por primera vez, ejecutar:
  # .\scripts\restore-db.ps1
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sisdoc_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Adminhuap2026!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
      - ./database:/var/opt/mssql/backup
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Adminhuap2026!" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Backend Node.js (producción) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: sisdoc_backend
    env_file: ./backend/.env
    environment:
      DB_SERVER: sqlserver
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    profiles: ["prod"]

  # ── Nginx + Frontend (producción) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sisdoc_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  sqlserver_data:
    name: sisdoc_sqlserver_data
