<html>
<head>
<title>Ingreso de Clientes</title>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
</head>
<script language="javascript">
function digito(){
		   str=document.f1.rut.value;
           len=str.length;
           i=0;
           pos=len;
           ml=0;
           mul=2;
           while(i <= len){
             if(mul <= 7){
               sub=str.substring(pos -1 , pos);
               ml = ml + sub * mul;
               i=i+1;
               pos=pos-1;
               mul = mul +1;
               }else{
               mul=2;   
               sub=str.substring(pos -1 , pos);
               ml = ml + sub * mul;
               i=i+1;
               pos=pos-1;
               mul=mul +1;
             }
           }
           mod=ml % 11;
           digito=11 - mod;
           if(digito==11){digito=0;}
           if(digito==10){digito="K";}
           dv_f=document.f1.dv.value;
           if(digito != dv_f){
            // alert("El Rut Ingresado No Es Valido,\n Verifique Su Digito Verificador E Ingreselo Nuevamente");
             return false;
           }else{ //alert("rut bueno");
             return true;
           }
}
function vale()
{ if (digito() )  {alert("El Rut Ingresado No Es Valido,\n Verifique Su Digito Verificador E Ingreselo Nuevamente");}
  else {alert("rut bueno");}
}
</script>
<body bgcolor="#CCCCCC">
<form  name="f1" id="f1">
  <table width="450" border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td><fieldset>
        <legend class="Estilo10">Mantencion de Clientes</legend>
        <table width="100%" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td width="20%" class="Estilo1">Rut</td>
    <td width="80%"><input name="rut" type="text" class="in_number" id="rut" size="8" maxlength="10" >
              - 
              <input name="dv" type="text" class="dv" id="dv" size="1" maxlength="1" ></td>
  </tr>
  <tr>
    <td>&nbsp;</td>
    <td><div align="center">
                <input name="submit" type="button"  value="Ingresar" onClick="vale()">
              </div></td>
  </tr>
</table>
</form>
</body>
</html>
